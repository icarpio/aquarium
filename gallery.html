<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquarium — Galería</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.gallery-page { min-height:100vh; padding-top:var(--nav-h); }

/* ── HEADER ── */
.gallery-header {
  padding:2.5rem 2rem 1.5rem;
  position:relative; overflow:hidden;
}
.gallery-header::after {
  content:''; position:absolute; bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,rgba(56,189,248,0.15),transparent);
}
.gh-eyebrow { font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--glow);margin-bottom:0.4rem;opacity:0.7; }
.gh-title { font-family:var(--font-serif);font-size:clamp(1.5rem,4vw,2.4rem);font-weight:700;color:var(--white);line-height:1.15;margin-bottom:0.4rem; }
.gh-title em { font-style:italic;color:var(--glow);opacity:0.85; }
.gh-meta { font-size:0.78rem;color:var(--muted);font-style:italic;font-family:var(--font-serif); }

/* ── FILTERS ── */
.gallery-filters {
  padding:0.75rem 2rem;
  display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap;
  border-bottom:1px solid rgba(56,189,248,0.05);
}
.filter-btn {
  padding:0.3rem 0.8rem; background:rgba(56,189,248,0.04);
  border:1px solid rgba(56,189,248,0.1); color:var(--muted);
  font-family:var(--font-mono); font-size:0.65rem; letter-spacing:0.08em;
  border-radius:100px; cursor:pointer; transition:all 0.2s;
}
.filter-btn:hover { color:var(--glow); border-color:rgba(56,189,248,0.3); background:rgba(56,189,248,0.08); }
.filter-btn.active { color:var(--glow); background:rgba(56,189,248,0.1); border-color:rgba(56,189,248,0.35); }

.search-wrap { margin-left:auto; position:relative; }
.search-icon { position:absolute;left:0.65rem;top:50%;transform:translateY(-50%);color:var(--dim);font-size:0.75rem;pointer-events:none; }
.search-input {
  background:rgba(7,17,29,0.8); border:1px solid rgba(56,189,248,0.1);
  color:var(--white); font-family:var(--font-mono); font-size:0.75rem;
  padding:0.35rem 0.85rem 0.35rem 2rem; border-radius:100px;
  outline:none; width:170px; transition:all 0.25s;
}
.search-input:focus { border-color:rgba(56,189,248,0.35); width:200px; }
.search-input::placeholder { color:var(--dim); }

/* ── GRID ── */
.gallery-grid {
  padding:1.5rem 2rem;
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
  gap:1.1rem;
}

/* ── CARD ── */
.fish-card {
  background:rgba(10,25,41,0.7); border:1px solid rgba(56,189,248,0.08);
  border-radius:4px; overflow:hidden;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  animation:card-appear 0.5s ease backwards;
  position:relative; backdrop-filter:blur(8px);
}
@keyframes card-appear { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:none;} }
.fish-card:hover { border-color:rgba(56,189,248,0.25); transform:translateY(-4px); box-shadow:0 10px 35px rgba(0,0,0,0.4),0 0 25px rgba(56,189,248,0.05); }
.fish-card.mine::before { content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--glow),var(--teal));opacity:0.6; }

.card-img-wrap { position:relative;aspect-ratio:4/3;background:rgba(4,15,30,0.9);overflow:hidden; }
.card-img { width:100%;height:100%;object-fit:contain;padding:0.65rem;display:block;transition:transform 0.4s ease; }
.fish-card:hover .card-img { transform:scale(1.05); }
.card-img-overlay { position:absolute;inset:0;background:linear-gradient(to top,rgba(7,17,29,0.5),transparent 50%);pointer-events:none; }
.card-color-line { height:2px;background:var(--fish-color,var(--glow));opacity:0.4; }

.card-body { padding:0.8rem 0.9rem 0.6rem; }
.card-name { font-family:var(--font-serif);font-size:0.95rem;font-weight:700;color:var(--white);line-height:1.2;margin-bottom:0.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.card-author { font-size:0.72rem;color:var(--muted);display:flex;align-items:center;gap:0.35rem; }
.card-author-dot { width:5px;height:5px;border-radius:50%;background:var(--fish-color,var(--glow));flex-shrink:0; }
.card-date { font-size:0.6rem;color:rgba(77,127,160,0.5);margin-top:0.4rem; }

.card-footer { padding:0.5rem 0.9rem;border-top:1px solid rgba(56,189,248,0.05);display:flex;align-items:center;min-height:40px; }
.own-badge { font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(56,189,248,0.4);margin-right:auto; }
.delete-btn {
  background:none; border:1px solid rgba(244,63,94,0.15); color:rgba(244,63,94,0.45);
  font-family:var(--font-mono); font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase;
  padding:0.28rem 0.7rem; border-radius:2px; cursor:pointer; transition:all 0.2s;
}
.delete-btn:hover { color:var(--danger); border-color:rgba(244,63,94,0.5); background:rgba(244,63,94,0.06); }


/* ── LIKE BUTTON ── */
.like-btn {
  display: flex; align-items: center; gap: 0.35rem;
  background: none; border: 1px solid rgba(251,113,133,0.15);
  color: rgba(251,113,133,0.45); border-radius: 100px;
  padding: 0.25rem 0.7rem; cursor: pointer;
  font-family: var(--font-mono); font-size: 0.65rem;
  transition: all 0.25s; margin-left: auto;
}
.like-btn:hover {
  color: #fb7185; border-color: rgba(251,113,133,0.5);
  background: rgba(251,113,133,0.07);
  transform: scale(1.05);
}
.like-btn.liked {
  color: #fb7185; border-color: rgba(251,113,133,0.45);
  background: rgba(251,113,133,0.1);
}
.like-btn.liked .heart { animation: heartPop 0.35s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes heartPop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.4); }
  100% { transform: scale(1); }
}
.like-btn .heart { font-size: 0.9rem; line-height: 1; }
.like-btn .like-count { font-size: 0.65rem; min-width: 10px; }
.like-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── SKELETON ── */
.skeleton { background:linear-gradient(90deg,rgba(56,189,248,0.03) 0%,rgba(56,189,248,0.08) 50%,rgba(56,189,248,0.03) 100%);background-size:200% 100%;animation:shimmer 1.5s ease infinite;border-radius:var(--radius); }
@keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
.skeleton-card { border:1px solid rgba(56,189,248,0.06);border-radius:4px;overflow:hidden; }
.skeleton-img  { height:130px; }
.skeleton-body { padding:0.8rem 0.9rem;display:flex;flex-direction:column;gap:0.45rem; }
.skeleton-line { height:11px;border-radius:2px; }

/* ── EMPTY ── */
.gallery-empty { grid-column:1/-1;text-align:center;padding:4rem 2rem; }
.gallery-empty-icon { font-size:3rem;opacity:0.2;margin-bottom:1rem; }
.gallery-empty-text { font-family:var(--font-serif);font-style:italic;font-size:1rem;color:var(--muted);margin-bottom:1.25rem; }

/* ── PAGINATION ── */
.pagination { display:flex;align-items:center;justify-content:center;gap:0.35rem;padding:0.75rem 2rem 2.5rem;flex-wrap:wrap; }
.page-btn {
  min-width:34px;height:34px;padding:0 0.4rem;
  background:rgba(56,189,248,0.04);border:1px solid rgba(56,189,248,0.1);
  color:var(--muted);font-family:var(--font-mono);font-size:0.7rem;border-radius:var(--radius);
  cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;
}
.page-btn:hover { color:var(--glow);border-color:rgba(56,189,248,0.3);background:rgba(56,189,248,0.08); }
.page-btn.active { color:var(--glow);background:rgba(56,189,248,0.12);border-color:var(--glow); }
.page-btn:disabled { opacity:0.3;cursor:not-allowed;pointer-events:none; }

/* ── RESPONSIVE ── */
@media (max-width:768px) {
  .gallery-header { padding:1.5rem 1rem 1rem; }
  .gallery-filters { padding:0.6rem 1rem; }
  .search-wrap { width:100%; margin-left:0; margin-top:0.25rem; }
  .search-input { width:100% !important; }
  .gallery-grid { padding:1rem; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:0.75rem; }
  .card-body { padding:0.6rem 0.7rem 0.5rem; }
  .card-name { font-size:0.85rem; }
  .card-footer { padding:0.4rem 0.7rem; }
}
@media (max-width:400px) {
  .gallery-grid { grid-template-columns:1fr 1fr; gap:0.6rem; }
}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div id="toast"></div>
<nav class="nav" id="nav"></nav>

<div class="gallery-page">
  <div class="gallery-header">
    <div class="gh-eyebrow">Colección completa</div>
    <h1 class="gh-title">La <em>galería</em> del océano</h1>
    <p class="gh-meta" id="ghMeta">Cargando peces…</p>
  </div>

  <div class="gallery-filters">
    <span style="font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim);">Mostrar:</span>
    <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
    <button class="filter-btn" id="filterMine" onclick="setFilter('mine',this)">Mis peces</button>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" type="text" id="searchInput" placeholder="Buscar por nombre…" oninput="onSearch(this.value)">
    </div>
  </div>

  <div class="gallery-grid" id="galleryGrid"></div>
  <div class="pagination" id="pagination"></div>
</div>

<script src="shared.js"></script>
<script>
renderNav();
if(!getToken()) document.getElementById('filterMine').style.display='none';

const LIMIT=20;
let currentPage=1, currentFilter='all', searchQuery='', searchTimer;

function setFilter(f,btn) {
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentPage=1; loadGallery();
}
function onSearch(q) {
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{ searchQuery=q.toLowerCase().trim(); currentPage=1; loadGallery(); },300);
}

async function loadGallery() {
  renderSkeletons();
  setLoading(true);
  try {
    const data=await api(`/api/aquarium/gallery/?source=${SOURCE}&page=${currentPage}&limit=${LIMIT}`,'GET',null,false);
    let results=data.results;
    const user=getUser();
    if(currentFilter==='mine'&&user) results=results.filter(f=>f.user===user.id);
    if(searchQuery) results=results.filter(f=>(f.name||'').toLowerCase().includes(searchQuery)||f.username.toLowerCase().includes(searchQuery));
    renderCards(results,data.total,data.page,data.limit);
  } catch(e){toast(apiErrorMsg(e),'error');document.getElementById('galleryGrid').innerHTML='';}
  finally{setLoading(false);}
}

function renderSkeletons() {
  document.getElementById('galleryGrid').innerHTML=Array(8).fill('').map(()=>`
    <div class="skeleton-card">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton skeleton-line" style="width:70%"></div>
        <div class="skeleton skeleton-line" style="width:45%"></div>
      </div>
    </div>`).join('');
}

function renderCards(fishes,total,page,limit) {
  const grid=document.getElementById('galleryGrid');
  const user=getUser();
  document.getElementById('ghMeta').textContent=total===0?'Ningún pez encontrado':total===1?'1 pez en la colección':`${total} peces en la colección`;
  if(fishes.length===0){
    grid.innerHTML=`<div class="gallery-empty"><div class="gallery-empty-icon">🐠</div><p class="gallery-empty-text">No hay peces aquí todavía</p><a href="draw.html" class="btn btn-primary">Dibujar el primero →</a></div>`;
    document.getElementById('pagination').innerHTML=''; return;
  }
  grid.innerHTML='';
  fishes.forEach((fish,idx)=>{
    const isOwn=user&&fish.user===user.id;
    const date=new Date(fish.created_at).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});
    const fc=fish.color||'#38bdf8';
    const card=document.createElement('div');
    card.className='fish-card'+(isOwn?' mine':'');
    card.style.setProperty('--fish-color',fc);
    card.style.animationDelay=`${idx*0.04}s`;
    card.innerHTML=`
      <div class="card-img-wrap">
        <img class="card-img" src="${fish.image_url}" alt="${fish.name||'pez'}" loading="lazy">
        <div class="card-img-overlay"></div>
      </div>
      <div class="card-color-line" style="background:${fc};"></div>
      <div class="card-body">
        <div class="card-name">${fish.name||'Pez sin nombre'}</div>
        <div class="card-author"><div class="card-author-dot"></div><span>${fish.username}</span></div>
        <div class="card-date">${date}</div>
      </div>
      <div class="card-footer">
        ${isOwn?'<span class="own-badge">Mi pez</span>':''}
        <button
          class="like-btn ${fish.liked ? 'liked' : ''}"
          id="like-${fish.id}"
          onclick="toggleLike(${fish.id}, this)"
          ${!user ? 'disabled title="Inicia sesión para dar like"' : ''}>
          <span class="heart">${fish.liked ? '♥' : '♡'}</span>
          <span class="like-count">${fish.likes_count || 0}</span>
        </button>
        ${isOwn?`<button class="delete-btn" style="margin-left:0.5rem;" onclick="deleteFish(${fish.id},this)">Eliminar</button>`:''}
      </div>`;
    grid.appendChild(card);
  });
  renderPagination(total,page,limit);
}

function renderPagination(total,page,limit) {
  const c=document.getElementById('pagination');
  const tp=Math.ceil(total/limit);
  if(tp<=1){c.innerHTML='';return;}
  let html=`<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>←</button>`;
  for(let i=1;i<=tp;i++){
    if(i===1||i===tp||(i>=page-2&&i<=page+2)) html+=`<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
    else if(i===page-3||i===page+3) html+=`<span style="color:var(--dim);font-size:0.7rem;padding:0 3px;">…</span>`;
  }
  html+=`<button class="page-btn" onclick="goPage(${page+1})" ${page===tp?'disabled':''}>→</button>`;
  c.innerHTML=html;
}
function goPage(p){if(p<1)return;currentPage=p;window.scrollTo({top:0,behavior:'smooth'});loadGallery();}

async function deleteFish(fishId,btn) {
  if(!confirm('¿Eliminar este pez? Se borrará también de Cloudinary.')) return;
  const card=btn.closest('.fish-card');
  card.style.opacity='0.4'; card.style.pointerEvents='none';
  setLoading(true);
  try {
    await api(`/api/aquarium/fishes/${fishId}/delete/`,'DELETE');
    toast('Pez eliminado','success'); loadGallery();
  } catch(e){toast(apiErrorMsg(e),'error');card.style.opacity='1';card.style.pointerEvents='auto';}
  finally{setLoading(false);}
}

async function toggleLike(fishId, btn) {
  if (!getToken()) { toast('Inicia sesión para dar like', 'error'); return; }

  // Optimistic UI update
  const heart     = btn.querySelector('.heart');
  const countEl   = btn.querySelector('.like-count');
  const isLiked   = btn.classList.contains('liked');
  const prevCount = parseInt(countEl.textContent) || 0;

  btn.disabled = true;
  btn.classList.toggle('liked', !isLiked);
  heart.textContent   = isLiked ? '♡' : '♥';
  countEl.textContent = isLiked ? prevCount - 1 : prevCount + 1;

  try {
    const data = await api(`/api/aquarium/fishes/${fishId}/like/`, 'POST');
    // Sync with real server count
    countEl.textContent = data.likes_count;
    btn.classList.toggle('liked', data.liked);
    heart.textContent = data.liked ? '♥' : '♡';
  } catch(e) {
    // Revert on error
    btn.classList.toggle('liked', isLiked);
    heart.textContent   = isLiked ? '♥' : '♡';
    countEl.textContent = prevCount;
    toast(apiErrorMsg(e), 'error');
  } finally {
    btn.disabled = false;
  }
}

loadGallery();
</script>
</body>
</html>
